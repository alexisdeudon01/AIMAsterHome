name: "HA Analyst – Dashboard & Integration Recommender"
version: "2.1.0"
slug: "ai_dashboard_builder"
description: >-
  Claude-powered HA analyst: proposes dashboards, integrations, and HACS
  add-ons with approval-gated execution. Reads entities, devices, areas,
  add-ons, and optional logs to generate tailored Lovelace YAML.
startup: application
boot: auto
init: false
homeassistant_api: true
hassio_api: true
ingress: true
ingress_port: 8099
panel_icon: "mdi:view-dashboard-variant"
panel_title: "HA Analyst"
arch:
  - aarch64
  - amd64
  - armv7
  - i386
map:
  - homeassistant_config:rw
options:
  anthropic_api_key: ""
  anthropic_model: "claude-3-5-sonnet-latest"
  github_token: ""
  poll_interval_minutes: 0
  include_logs: false
  logs_max_lines: 100
  allow_write_homeassistant_config: false
schema:
  anthropic_api_key: password
  anthropic_model: str
  github_token: password?
  poll_interval_minutes: int
  include_logs: bool
  logs_max_lines: int
  allow_write_homeassistant_config: bool
